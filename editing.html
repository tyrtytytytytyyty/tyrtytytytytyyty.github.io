<div class="section" style="padding-top:0;">

    <div class="showcase-item">
      <div class="showcase-media">
        <div class="showcase-placeholder"><div class="placeholder-icon"><svg viewBox="0 0 24 24" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg></div><span>Coming soon</span></div>

<div class="section" id="testimonials">
  <p class="section-label">Testimonials</p>
  <div class="testimonials-grid" id="testimonials-grid">
    <div id="empty-testimonials" style="display:flex;align-items:center;justify-content:center;width:100%;grid-column:1/-1;padding:32px 0;"><p style="font-size:13px;color:var(--text-muted);">No testimonials yet.</p></div>
  </div>
  <div class="t-form-wrap">
    <p class="t-form-title">Leave a testimonial</p>
    <div class="form-group"><label class="form-label" for="t-name">Your name</label><input class="form-input" type="text" id="t-name" placeholder="e.g. Alex M." autocomplete="off"></div>
    <div class="form-group"><label class="form-label">Rating</label><div class="star-picker" id="star-picker"><span class="star-pick" data-val="1">☆</span><span class="star-pick" data-val="2">☆</span><span class="star-pick" data-val="3">☆</span><span class="star-pick" data-val="4">☆</span><span class="star-pick" data-val="5">☆</span></div></div>
    <div class="form-group"><label class="form-label" for="t-text">Your experience</label><textarea class="form-textarea" id="t-text" placeholder="Tell others about working with tyy..."></textarea></div>
    <div class="form-group">
      <label class="form-label">Attach an image (optional)</label>
      <label class="img-upload-label" for="t-img-input"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>Choose image</label>
      <input type="file" id="t-img-input" accept="image/*">
      <span id="img-filename" style="font-size:12px;color:var(--text-muted);margin-left:10px;"></span>
    </div>
    <button class="submit-btn" id="submit-testimonial">Submit</button>
    <div class="pending-msg" id="pending-msg">Thank you for submitting!</div>
  </div>
</div>

<script src="shared.js"></script>
<script>
const SUPA_URL='https://zoguypxxotlgjxplcbtz.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpvZ3V5cHh4b3RsZ2p4cGxjYnR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5OTM1ODMsImV4cCI6MjA4OTU2OTU4M30.gVGhRpbd8Mhhhvkdfq8KdcJ3zDu-WpsG46CIeBW8CkU';
const supa={h:{'apikey':SUPA_KEY,'Authorization':`Bearer ${SUPA_KEY}`,'Content-Type':'application/json'},async get(q){const r=await fetch(`${SUPA_URL}/rest/v1/${q}`,{headers:this.h});return r.json();},async post(p,b){return fetch(`${SUPA_URL}/rest/v1/${p}`,{method:'POST',headers:{...this.h,'Prefer':'return=minimal'},body:JSON.stringify(b)});},async uploadImage(f){const fn=`${Date.now()}.${f.name.split('.').pop()}`;const r=await fetch(`${SUPA_URL}/storage/v1/object/testimonial-images/${fn}`,{method:'POST',headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${SUPA_KEY}`,'Content-Type':f.type},body:f});return r.ok?`${SUPA_URL}/storage/v1/object/public/testimonial-images/${fn}`:null;}};
const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
async function renderApproved(){const grid=document.getElementById('testimonials-grid');const empty=document.getElementById('empty-testimonials');grid.querySelectorAll('.testimonial-card').forEach(c=>c.remove());try{const data=await supa.get('testimonials?select=*&status=eq.approved&or=(category.eq.editing,category.eq.universal)&order=created_at.desc');if(!data.length){empty.style.display='flex';return;}empty.style.display='none';data.forEach(t=>{const c=document.createElement('div');c.className='testimonial-card';const img=t.image?`<img class="t-image" src="${esc(t.image)}" alt="">`:'';c.innerHTML=`<div class="t-stars">${Array.from({length:5},(_,i)=>`<span class="t-star" style="color:${i<t.rating?'var(--star-on)':'var(--star-off)'}">${i<t.rating?'★':'☆'}</span>`).join('')}</div>${img}<p class="t-text">${esc(t.message)}</p><p class="t-author">${esc(t.name)}</p>`;grid.appendChild(c);});}catch(e){empty.style.display='flex';}}
renderApproved();
let selectedRating=0;const rStars=document.querySelectorAll('.star-pick');function renderR(n){rStars.forEach((s,i)=>s.textContent=i<n?'★':'☆');}rStars.forEach(s=>{s.addEventListener('mouseenter',()=>renderR(+s.dataset.val));s.addEventListener('mouseleave',()=>renderR(selectedRating));s.addEventListener('click',()=>{selectedRating=+s.dataset.val;renderR(selectedRating);});});
let attachedFile=null;const imgInput=document.getElementById('t-img-input');imgInput.addEventListener('change',()=>{const f=imgInput.files[0];if(!f)return;document.getElementById('img-filename').textContent=f.name;attachedFile=f;});
document.getElementById('submit-testimonial').addEventListener('click',async()=>{const name=document.getElementById('t-name').value.trim();const message=document.getElementById('t-text').value.trim();const btn=document.getElementById('submit-testimonial');if(!name||!message||!selectedRating){alert('Please fill in your name, a rating, and your message.');return;}btn.textContent='Sending…';btn.disabled=true;let imageUrl=null;if(attachedFile)imageUrl=await supa.uploadImage(attachedFile);const res=await supa.post('testimonials',{name,message,rating:selectedRating,image:imageUrl,status:'pending',category:'editing'});btn.textContent='Submit';btn.disabled=false;if(res.ok||res.status===201){document.getElementById('t-name').value='';document.getElementById('t-text').value='';document.getElementById('img-filename').textContent='';imgInput.value='';attachedFile=null;selectedRating=0;renderR(0);const msg=document.getElementById('pending-msg');msg.style.display='block';setTimeout(()=>msg.style.display='none',4000);}else{alert('Something went wrong — please try again.');}});
</script>
